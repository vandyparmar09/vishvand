<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Quote - Vishvand Hardware Ltd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex flex-col min-h-screen">

    <header class="bg-white shadow-md sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-28 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-4 group">
                <img src="logo.png" alt="Logo" class="h-20 w-20 object-contain rounded-xl shadow-md border border-slate-100 p-1 group-hover:scale-105 transition-all duration-300">
                <div class="flex flex-col">
                    <span class="text-2xl font-black tracking-tight text-slate-900 leading-none">VISHVAND</span>
                    <span class="text-xs font-bold text-slate-500 tracking-widest mt-1">HARDWARE LTD</span>
                </div>
            </a>
            <nav class="hidden md:flex space-x-8 text-sm font-bold tracking-wide uppercase">
                <a href="index.html" class="text-slate-600 hover:text-blue-700 pb-1 transition-all">Home</a>
                <a href="products.html" class="text-slate-600 hover:text-blue-700 pb-1 transition-all">In-Store Stock</a>
                <a href="about.html" class="text-slate-600 hover:text-blue-700 pb-1 transition-all">About Us</a>
                <a href="request-quote.html" class="text-blue-700 border-b-2 border-blue-700 pb-1">Request Quote</a>
                <a href="contact.html" class="text-slate-600 hover:text-blue-700 pb-1 transition-all">Contact Us</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-16 w-full">
        <div class="bg-white border border-slate-200 p-8 sm:p-12 rounded-2xl shadow-xl hover:shadow-2xl hover:scale-[1.01] transition-all duration-300">
            <h1 class="text-3xl font-black text-slate-950 uppercase tracking-tight mb-2">Submit Material Sheets</h1>
            <p class="text-slate-500 text-xs font-medium leading-relaxed mb-10">
                Managing a complex commercial layout or stocking a new project side run? Input your quantitative requirements for structural lines below.
            </p>
            
            <form action="#" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-black text-slate-700 uppercase tracking-widest mb-2">Contact Name</label>
                        <input type="text" name="customer_name" class="w-full border border-slate-300 rounded-xl px-5 py-4 text-sm focus:outline-none focus:border-blue-700 focus:ring-2 focus:ring-blue-100 transition-all font-medium" placeholder="e.g. Corporate Manager" required>
                    </div>
                    <div>
                        <label class="block text-xs font-black text-slate-700 uppercase tracking-widest mb-2">Active Phone Link</label>
                        <input type="tel" name="customer_phone" class="w-full border border-slate-300 rounded-xl px-5 py-4 text-sm focus:outline-none focus:border-blue-700 focus:ring-2 focus:ring-blue-100 transition-all font-medium" placeholder="e.g. +255 (0) 665 351 910" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-700 uppercase tracking-widest mb-2">Required Materials Manifest</label>
                    <textarea name="material_list" rows="6" class="w-full border border-slate-300 rounded-xl px-5 py-4 text-sm focus:outline-none focus:border-blue-700 focus:ring-2 focus:ring-blue-100 transition-all font-medium placeholder-slate-400" placeholder="Example: 40 lengths of PPR plumbing pipe, 10 rolls of electrical cable..." required></textarea>
                </div>
                <div>
                    <button type="submit" class="w-full bg-blue-700 hover:bg-blue-600 text-white text-xs font-black uppercase tracking-widest py-5 rounded-xl transition-all duration-300 shadow-md hover:shadow-lg hover:scale-[1.01]">
                        Submit Quote Inquiry
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="bg-slate-950 text-slate-400 py-10 border-t border-slate-900">
        <div class="max-w-7xl mx-auto px-4 text-center text-[10px] uppercase tracking-widest font-bold text-slate-600">
            &copy; 2026 Vishvand Hardware Ltd. All rights reserved.
        </div>
    </footer>

</body>
</html>
